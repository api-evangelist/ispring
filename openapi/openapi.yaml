openapi: 3.0.0
info:
  title: 'Learn Rest Api'
  version: '3.0'
servers:
  -
    url: 'https://api-learn.ispring.com'
    description: 'Main server'
paths:
  /api/v3/token:
    post:
      tags:
        - token
      summary: 'Generates a new access token based on client_id and client_secret'
      operationId: AccessRequest
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClientCredentialsGrantTypeRequest'
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
      security:
        - {  }
  /content:
    get:
      tags:
        - content
      summary: 'Get content list'
      operationId: GetContent
      parameters:
        -
          $ref: '#/components/parameters/targetLocale'
        -
          name: contentTypes
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ContentType'
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContentItemInformation'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContentItemInformation'
                xml:
                  name: response
                  wrapped: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  /contents:
    get:
      tags:
        - content
      summary: 'List content'
      operationId: ListContent
      parameters:
        -
          $ref: '#/components/parameters/pageSize'
        -
          $ref: '#/components/parameters/pageToken'
        -
          $ref: '#/components/parameters/targetLocale'
        -
          name: 'contentItemIds[]'
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              format: uuid
        -
          name: contentTypes
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ContentType'
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentItemsInformationPage'
            application/xml:
              schema:
                $ref: '#/components/schemas/ContentItemsInformationPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
    post:
      tags:
        - content
      summary: 'List content'
      operationId: ListContentByPost
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              properties:
                contentItemIds:
                  type: array
                  items: { type: string, format: uuid }
                  xml: { name: contentItemIds }
                contentTypes:
                  type: array
                  items: { $ref: '#/components/schemas/ContentType' }
                  xml: { name: contentTypes }
              type: object
              xml:
                name: request
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentItemsInformationPage'
            application/xml:
              schema:
                $ref: '#/components/schemas/ContentItemsInformationPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  '/content/{contentId}':
    get:
      tags:
        - content
      summary: 'Get content item'
      operationId: GetContentItem
      parameters:
        -
          $ref: '#/components/parameters/targetLocale'
        -
          name: contentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                required:
                  - contentItem
                properties:
                  contentItem: { $ref: '#/components/schemas/ContentItemInformation' }
                type: object
            application/xml:
              schema:
                required:
                  - contentItem
                properties:
                  contentItem: { $ref: '#/components/schemas/ContentItemInformation' }
                type: object
                xml:
                  name: response
                  wrapped: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  '/content/{contentId}/final_statuses':
    get:
      tags:
        - content
      summary: 'Get content item final statuses'
      operationId: GetContentItemFinalStatuses
      parameters:
        -
          name: contentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContentItemFinalStatus'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContentItemFinalStatus'
                xml:
                  name: statuses
                  wrapped: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          description: 'Session not found'
          content:
            text/plain:
              schema:
                type: string
                example: 'Unknown content item'
  /courses/modules:
    get:
      tags:
        - content
      summary: 'List courses modules'
      operationId: ListCoursesModules
      parameters:
        -
          $ref: '#/components/parameters/pageSize'
        -
          $ref: '#/components/parameters/pageToken'
        -
          name: courseIds
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
              format: uuid
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoursesModulesPage'
            application/xml:
              schema:
                $ref: '#/components/schemas/CoursesModulesPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
      deprecated: true
  /course_fields:
    get:
      tags:
        - content
      summary: 'List course fields'
      operationId: ListCourseFields
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseFields'
            application/xml:
              schema:
                $ref: '#/components/schemas/CourseFields'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  '/content/create/{contentType}':
    post:
      tags:
        - content
      summary: 'Create content item'
      operationId: CreateContent
      parameters:
        -
          name: contentType
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ContentType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                -
                  $ref: '#/components/schemas/CreateCourseRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                description: 'The content item ID'
                type: string
                format: uuid
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  '/course/{courseId}/modules':
    get:
      tags:
        - content
      summary: 'List modules by course id'
      operationId: ListCourseModules
      parameters:
        -
          name: courseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                required:
                  - modules
                properties:
                  modules: { type: array, items: { $ref: '#/components/schemas/CoursesModule' } }
                type: object
            application/xml:
              schema:
                required:
                  - modules
                properties:
                  modules: { type: array, items: { $ref: '#/components/schemas/CoursesModule' } }
                type: object
                xml:
                  name: response
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          description: 'Unknown content item'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /statistics/course:
    post:
      tags:
        - statistics
      summary: 'Update course status'
      operationId: UpdateCourseStatus
      parameters:
        -
          name: courseId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        -
          name: enrollmentIds
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ArrayOfIds'
        -
          name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/CourseCompletionStatus'
        -
          name: date
          in: query
          required: false
          schema:
            type: string
            format: date-time
        -
          name: reason
          in: query
          required: false
          schema:
            type: string
        -
          name: awardedScore
          in: query
          required: false
          schema:
            type: number
            maximum: 100
            minimum: 0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCourseStatus'
          application/xml:
            schema:
              $ref: '#/components/schemas/UpdateCourseStatus'
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                required:
                  - taskId
                properties:
                  taskId: { description: 'Async Task ID', type: integer }
                type: object
            application/xml:
              schema:
                required:
                  - taskId
                properties:
                  taskId: { description: 'Async Task ID', type: integer }
                type: object
                xml:
                  name: response
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  /statistics/module:
    post:
      tags:
        - statistics
      summary: 'Update modules statuses'
      operationId: UpdateModuleStatuses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModulesStatuses'
          application/xml:
            schema:
              $ref: '#/components/schemas/UpdateModulesStatuses'
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                required:
                  - taskId
                properties:
                  taskId: { description: 'Async Task ID', type: integer }
                type: object
            application/xml:
              schema:
                required:
                  - taskId
                properties:
                  taskId: { description: 'Async Task ID', type: integer }
                type: object
                xml:
                  name: response
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
    delete:
      tags:
        - statistics
      summary: 'Reset modules statistics'
      operationId: ResetModuleStatistics
      parameters:
        -
          name: courseId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        -
          name: enrollmentIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              format: uuid
        -
          name: contentItemIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              format: uuid
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                required:
                  - taskId
                properties:
                  taskId: { description: 'Async Task ID', type: integer }
                type: object
            application/xml:
              schema:
                required:
                  - taskId
                properties:
                  taskId: { description: 'Async Task ID', type: integer }
                type: object
                xml:
                  name: response
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  '/task/{taskId}/status':
    get:
      tags:
        - task
      summary: 'Get async task status'
      operationId: GetTaskStatus
      parameters:
        -
          name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStatus'
            application/xml:
              schema:
                $ref: '#/components/schemas/TaskStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  /assignments:
    get:
      tags:
        - assignments
      summary: 'List assignments'
      operationId: ListAssignments
      parameters:
        -
          $ref: '#/components/parameters/pageSize'
        -
          $ref: '#/components/parameters/pageToken'
        -
          name: ungraded
          in: query
          required: false
          schema:
            type: integer
            enum:
              - 0
              - 1
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentsPage'
            application/xml:
              schema:
                $ref: '#/components/schemas/AssignmentsPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  '/assignment/{assignmentId}/attempts/ungraded':
    get:
      tags:
        - assignments
      summary: 'Retrieves a list of ungraded attempts for an assignment'
      operationId: ListAssignmentAttempts
      parameters:
        -
          name: assignmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        -
          name: 'userIds[]'
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              format: uuid
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssignmentAttempt'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssignmentAttempt'
                xml:
                  name: response
                  wrapped: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  /assignments/attempts/grade:
    post:
      tags:
        - assignments
      summary: 'Grade user assignment attempts'
      operationId: GradeAssignments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentAttemptGrades'
          application/xml:
            schema:
              $ref: '#/components/schemas/AssignmentAttemptGrades'
      responses:
        '200':
          description: 'Success Response'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  /learning_track/courses:
    get:
      tags:
        - learning_track
      summary: 'Retrieves a list of courses included in the trajectories'
      operationId: ListLearningTracksCourses
      parameters:
        -
          name: learningTrackIds
          in: query
          required: true
          schema:
            description: 'Comma-separated array of track IDs'
            type: string
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LearningTrackCourse'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LearningTrackCourse'
                xml:
                  name: response
                  wrapped: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  /courses_tree:
    get:
      tags:
        - content
      summary: 'Get courses tree'
      operationId: GetCoursesTree
      parameters:
        -
          $ref: '#/components/parameters/targetLocale'
        -
          name: contentItemIds
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ArrayOfIds'
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseTreeItem'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseTreeItem'
                xml:
                  name: response
                  wrapped: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  /quizzes:
    get:
      tags:
        - quizzes
      summary: 'Retrieves a list of quizzes'
      operationId: ListQuizzes
      parameters:
        -
          $ref: '#/components/parameters/pageSize'
        -
          $ref: '#/components/parameters/pageToken'
        -
          name: quizIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              format: uuid
        -
          name: contentItemIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              format: uuid
        -
          name: parentCourseIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              format: uuid
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizzesPage'
            application/xml:
              schema:
                $ref: '#/components/schemas/QuizzesPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  /department:
    get:
      tags:
        - department
      summary: 'Get department list'
      operationId: GetDepartments
      parameters:
        -
          name: code
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                required:
                  - departments
                properties:
                  departments: { type: array, items: { $ref: '#/components/schemas/Department' } }
                type: object
            application/xml:
              schema:
                required:
                  - departments
                properties:
                  departments: { type: array, items: { $ref: '#/components/schemas/Department' } }
                type: object
                xml:
                  name: response
                  wrapped: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
    post:
      tags:
        - department
      summary: 'Add a new department'
      operationId: AddDepartment
      parameters:
        -
          $ref: '#/components/parameters/returnObject'
        -
          name: X-Name
          in: header
          required: false
          schema:
            type: string
        -
          name: X-Parent-Department-Id
          in: header
          required: false
          schema:
            type: string
            format: uuid
        -
          name: X-Code
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewDepartment'
          application/xml:
            schema:
              $ref: '#/components/schemas/NewDepartment'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                description: 'The department ID'
                type: string
                format: uuid
            application/xml:
              schema:
                description: 'The department ID'
                type: string
                format: uuid
                xml:
                  name: response
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  '/department/{departmentId}':
    get:
      tags:
        - department
      summary: 'Get department info'
      operationId: GetDepartment
      parameters:
        -
          name: departmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                properties:
                  response: { $ref: '#/components/schemas/Department' }
                type: object
            application/xml:
              schema:
                properties:
                  response: { $ref: '#/components/schemas/Department' }
                type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
    post:
      tags:
        - department
      summary: 'Update department'
      operationId: UpdateDepartment
      parameters:
        -
          name: departmentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDepartment'
          application/xml:
            schema:
              $ref: '#/components/schemas/UpdateDepartment'
      responses:
        '204':
          description: 'No Content'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
    delete:
      tags:
        - department
      summary: 'Delete department'
      operationId: RemoveDepartment
      parameters:
        -
          name: departmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'Successful operation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  /departments:
    get:
      tags:
        - departments
      summary: 'List departments'
      operationId: ListDepartments
      parameters:
        -
          $ref: '#/components/parameters/pageSize'
        -
          $ref: '#/components/parameters/pageToken'
      responses:
        '200':
          description: 'Success Response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentsPage'
            application/xml:
              schema:
                $ref: '#/components/schemas/DepartmentsPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
  '/department/{departmentId}/subordination':
    post:
      tags:
        - department
      summary: 'Change department subordination'
